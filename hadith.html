    <style>
        :root {
            --primary-green: #003314;
            --deep-green: #001f0c;
            --gold: #d4af37;
            --gold-light: #f9e27b;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--primary-green);
            color: var(--text-white);
            font-family: 'Lato', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 31, 12, 0.95);
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-family: 'Cinzel', serif; color: var(--gold); font-weight: bold; font-size: 1.4rem; }
        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; }
        .nav-links a { color: var(--gold-light); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-white); }

        /* --- HADITH CARD SECTION --- */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        #hadith-card {
            max-width: 650px;
            width: 100%;
            background: var(--deep-green);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* Decorative Quote Icons */
        #hadith-card::before {
            content: '\f10d'; /* FontAwesome Quote Left */
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            top: 25px;
            left: 35px;
            color: rgba(212, 175, 55, 0.15);
            font-size: 3.5rem;
        }

        .hadith-header {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            letter-spacing: 3px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        #hadith-text {
            font-family: 'Cinzel', serif;
            font-size: 1.7rem;
            line-height: 1.6;
            color: var(--gold-light);
            margin-bottom: 35px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hadith-source {
            display: block;
            font-style: italic;
            color: #bdc3c7;
            font-size: 1.1rem;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: var(--deep-green);
            border-top: 1px solid var(--gold);
            color: #888;
            font-size: 0.8rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #hadith-text { font-size: 1.3rem; }
            #hadith-card { padding: 40px 20px; }
        }
    </style>
</head>

    <div class="main-container">
        <article id="hadith-card">
            <div class="hadith-header">Hadith of the Day</div>
            <p id="hadith-text">Loading inspiration...</p>
            <small id="hadith-source"></small>
        </article>
    </div>

    <footer>
        &copy; 2026 Islam in Rwanda. All Rights Reserved.
    </footer>

    <script>
        // Array of Hadiths - You can add as many as you want here!
        const hadiths = [
            {text: "Actions are judged by intentions.", source: "Sahih al-Bukhari 1:1"},
            {text: "None of you truly believes until he loves for his brother what he loves for himself.", source: "Sahih al-Bukhari 13:6"},
            {text: "The best among you are those who have the best manners and character.", source: "Sahih al-Bukhari"},
            {text: "A strong believer is better and more beloved to Allah than a weak believer.", source: "Sahih Muslim 2664"},
            {text: "The most beloved of deeds to Allah are those that are most consistent, even if they are small.", source: "Sahih al-Bukhari 6464"},
            {text: "He who does not show mercy to others, will not be shown mercy.", source: "Sahih al-Bukhari 5997"},
            {text: "The best of you are those who are best to their families.", source: "Sunan al-Tirmidhi 3895"},
            {text: "Kindness is a mark of faith, and whoever is not kind has no faith.", source: "Sahih Muslim"},
            {text: "Seven people will be shaded by Allah on a Day when there is no shade except His... including a youth who grew up in the worship of Allah.", source: "Sahih al-Bukhari 660"}
        ];

        // Function to select today's Hadith based on the calendar date
        function getTodaysHadith() {
            const date = new Date();
            // Use the day of the month to pick an index
            // The % ensures it loops back to 0 if the day is larger than the list size
            const index = date.getDate() % hadiths.length; 
            return hadiths[index];
        }

        // Apply the Hadith when the page finishes loading
        window.onload = function() {
            const todayHadith = getTodaysHadith();
            document.getElementById("hadith-text").innerText = `"${todayHadith.text}"`;
            document.getElementById("hadith-source").innerText = `— ${todayHadith.source}`;
        };
    </script>

</body>
